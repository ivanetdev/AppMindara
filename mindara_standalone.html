<script type="module">
import{h,render}from'https://esm.sh/preact@10.19.2';
import{useState,useEffect}from'https://esm.sh/preact@10.19.2/hooks';
import htm from'https://esm.sh/htm@3.1.1';
const html=htm.bind(h);
const LOGO=window.LOGO_SRC;

const STORE='mindara_v2';
const DEFUSERS=[
  {id:'adm1',username:'admin',password:'admin123',name:'Administrador',role:'admin',active:1},
  {id:'usr1',username:'terapeuta',password:'terapeuta123',name:'Terapeuta Demo',role:'user',active:1}
];
const DEFDATA={patients:[],therapists:[],treatments:[],appointments:[],invoices:[],users:DEFUSERS,counter:1};
const dbLoad=()=>{try{const r=localStorage.getItem(STORE);return r?JSON.parse(r):DEFDATA;}catch{return DEFDATA;}};
const dbSave=d=>{try{localStorage.setItem(STORE,JSON.stringify(d));}catch{}};

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const fmtDate=s=>s?new Date(s+'T12:00:00').toLocaleDateString('es-ES'):'';
const fmtMoney=n=>new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(n||0);
const initials=n=>n?.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()||'?';
const todayStr=()=>new Date().toISOString().slice(0,10);

const COLORS=['#0F6E56','#534AB7','#185FA5','#A32D2D','#854F0B','#086E72','#6B2D8B','#3B6D11','#5F5E5A','#C2410C'];

const inp='width:100%;box-sizing:border-box;padding:8px 12px;border-radius:8px;border:1px solid var(--bdr2);background:var(--bg);color:var(--txt);font-size:13px;font-family:inherit;';
const crd='background:var(--bg);border-radius:12px;border:1px solid var(--bdr);padding:16px 20px;';
const btnP='padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;background:var(--grn);color:white;border:none;font-family:inherit;';
const btnS='padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;background:var(--bg2);color:var(--txt);border:1px solid var(--bdr2);font-family:inherit;';
const bxs=b=>`padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;font-family:inherit;${b}`;

function Bdg({s}){
  const m={activo:['#E1F5EE','#0F6E56','Activo'],completado:['#E6F1FB','#185FA5','Completado'],cancelado:['#FCEBEB','#A32D2D','Cancelado'],pendiente:['#FAEEDA','#854F0B','Pendiente'],pagada:['#E1F5EE','#0F6E56','Pagada'],borrador:['#F1EFE8','#5F5E5A','Borrador'],programada:['#EEEDFE','#534AB7','Programada'],realizada:['#E1F5EE','#0F6E56','Realizada']};
  const[bg,c,t]=m[s]||m.pendiente;
  return html`<span style="background:${bg};color:${c};padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;">${t}</span>`;
}
function Av({name,sz=36,color}){
  const bg=color?color+'22':'#E1F5EE';const c=color||'#0F6E56';
  return html`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${bg};color:${c};display:flex;align-items:center;justify-content:center;font-size:${Math.round(sz*.35)}px;font-weight:500;flex-shrink:0;border:2px solid ${c}33;">${initials(name)}</div>`;
}
function Fld({label,children}){return html`<div style="margin-bottom:12px;"><label style="display:block;font-size:11px;color:var(--txt2);margin-bottom:4px;font-weight:500;">${label}</label>${children}</div>`;}
function G2({children}){return html`<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 14px;">${children}</div>`;}
function SHdr({t}){return html`<div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bdr);">${t}</div>`;}
function Spn(){return html`<div style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;"></div>`;}

function Moda({title,onClose,wide,xl,children}){
  const w=xl?'860px':wide?'700px':'520px';
  return html`
    <div style="position:fixed;inset:0;z-index:200;overflow-y:auto;" onClick=${e=>e.target===e.currentTarget&&onClose()}>
      <div style="min-height:100%;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.5);" onClick=${e=>e.target===e.currentTarget&&onClose()}>
        <div style="background:var(--bg);border-radius:14px;border:1px solid var(--bdr2);width:100%;max-width:${w};padding:22px;animation:fi .2s ease;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
            <h2 style="margin:0;font-size:16px;font-weight:500;color:var(--txt);">${title}</h2>
            <button onClick=${onClose} style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--txt2);padding:2px 8px;line-height:1;">x</button>
          </div>
          ${children}
        </div>
      </div>
    </div>`;
}

// LOGIN
function Login({onLogin}){
  const[f,sf]=useState({username:'',password:''});
  const[err,se]=useState('');
  const sv=k=>e=>sf(p=>({...p,[k]:e.target.value}));

function InvForm({patients,appointments,treatments,therapists,onSave,onClose}){
  const[f,sf]=useState({patientId:'',aptIds:[],taxRate:'0',dueDate:'',notes:'',status:'pendiente'});
  const s=k=>e=>sf(p=>Object.assign({},p,{[k]:e.target.value}));
  const avail=appointments.filter(a=>a.patientId===f.patientId&&!a.invoiced&&a.status==='realizada');
  const tog=id=>sf(p=>Object.assign({},p,{aptIds:p.aptIds.includes(id)?p.aptIds.filter(x=>x!==id):[...p.aptIds,id]}));
  const price=a=>{
    if(a.treatmentId){const t=treatments.find(t=>t.id===a.treatmentId);if(t)return +t.pricePerSession||0;}
    return +therapists.find(t=>t.id===a.therapistId)?.rate||0;
  };
  const sel=appointments.filter(a=>f.aptIds.includes(a.id));
  const sub=sel.reduce((s,a)=>s+price(a),0);
  const tax=sub*(+f.taxRate/100);
  const tot=sub+tax;
  return html`
    <${Fld} label="Paciente *">
      <select style=${inp} value=${f.patientId} onChange=${e=>sf(p=>Object.assign({},p,{patientId:e.target.value,aptIds:[]}))}>
        <option value="">Seleccionar...</option>
        ${patients.map(p=>html`<option value=${p.id}>${p.name}</option>`)}
      </select>
    </${Fld}>
    ${f.patientId&&html`
      <${Fld} label="Sesiones sin facturar">
        ${avail.length===0
          ?html`<p style="font-size:12px;color:var(--txt2);margin:0;padding:8px 0;">No hay sesiones disponibles.</p>`
          :html`<div style="border:1px solid var(--bdr2);border-radius:8px;overflow:hidden;max-height:180px;overflow-y:auto;">
            ${avail.map((a,i)=>{
              const th=therapists.find(t=>t.id===a.therapistId);
              const pr=price(a);
              const chk=f.aptIds.includes(a.id);
              return html`<div onClick=${()=>tog(a.id)} style="display:flex;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;background:${chk?'#E1F5EE':i%2?'var(--bg2)':'var(--bg)'};border-bottom:${i<avail.length-1?'1px solid var(--bdr)':'none'};">
                <div style="width:15px;height:15px;border-radius:3px;border:1.5px solid ${chk?'#0F6E56':'var(--bdr2)'};background:${chk?'#0F6E56':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">${chk&&html`<span style="color:white;font-size:9px;">v</span>`}</div>
                <div style="flex:1;"><div style="font-size:12px;font-weight:500;color:var(--txt);">${fmtDate(a.date)} - ${a.time}</div><div style="font-size:11px;color:var(--txt2);">${th?th.name:''} - ${a.duration} min</div></div>
                <div style="font-size:12px;font-weight:500;">${fmtMoney(pr)}</div>
              </div>`;
            })}
          </div>`}
      </${Fld}>
    `}
    <${G2}>
      <${Fld} label="IVA (%)"><select style=${inp} value=${f.taxRate} onChange=${s('taxRate')}><option value="0">0% (exento)</option><option value="10">10%</option><option value="21">21%</option></select></${Fld}>
      <${Fld} label="Fecha vencimiento"><input style=${inp} type="date" value=${f.dueDate} onInput=${s('dueDate')}/></${Fld}>
    </${G2}>
    <${Fld} label="Estado"><select style=${inp} value=${f.status} onChange=${s('status')}><option value="borrador">Borrador</option><option value="pendiente">Pendiente de pago</option><option value="pagada">Pagada</option></select></${Fld}>
    <${Fld} label="Notas"><textarea style="${inp}min-height:48px;resize:vertical;" value=${f.notes} onInput=${s('notes')}/></${Fld}>
    ${f.aptIds.length>0&&html`
      <div style="background:var(--bg2);border-radius:8px;padding:12px 14px;margin-bottom:14px;border:1px solid var(--bdr);">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;"><span style="color:var(--txt2);">Subtotal (${f.aptIds.length} ses.)</span><span>${fmtMoney(sub)}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;"><span style="color:var(--txt2);">IVA ${f.taxRate}%</span><span>${fmtMoney(tax)}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:500;border-top:1px solid var(--bdr);padding-top:8px;"><span>Total</span><span style="color:#0F6E56;">${fmtMoney(tot)}</span></div>
      </div>
    `}
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button style=${btnS} onClick=${onClose}>Cancelar</button>
      <button style=${btnP} onClick=${()=>(f.patientId&&f.aptIds.length>0)&&onSave(Object.assign({},f,{subtotal:sub,tax:tax,total:tot}))}>Generar factura</button>
    </div>`;
}

        <div style="display:flex;justify-content:space-between;padding:10px 12px;font-size:15px;font-weight:600;background:#0F6E56;color:white;border-radius:8px;margin-top:4px;"><span>TOTAL</span><span>${fmtMoney(inv.total)}</span></div>
      </div>
    </div>
    ${inv.notes&&html`<div style="background:var(--bg2);border-radius:8px;padding:10px 14px;margin-bottom:14px;"><div style="font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:3px;">NOTAS</div><div style="font-size:12px;">${inv.notes}</div></div>`}
    <div style="display:flex;gap:8px;justify-content:flex-end;" class="np">
      <button style=${btnS} onClick=${onClose}>Cerrar</button>
      <button style=${btnP} onClick=${()=>window.print()}>Imprimir / PDF</button>
    </div>
  </div>`;
}

// DOCUMENTS
function DocSelector({d,onSelect,onClose}){
  const[pid,spid]=useState('');
  const[tid,stid]=useState('');
  const[dtype,sd]=useState('informe');
  const[ex,se]=useState({motivo:'',evolucion:'',observaciones:'',recomendaciones:'',fecha:todayStr()});
  const sv=k=>e=>se(p=>Object.assign({},p,{[k]:e.target.value}));
  const pat=d.patients.find(p=>p.id===pid);
  const th=d.therapists.find(t=>t.id===tid);
  const patApts=d.appointments.filter(a=>a.patientId===pid&&a.status==='realizada').sort((a,b)=>a.date.localeCompare(b.date));
  const patTx=d.treatments.filter(t=>t.patientId===pid);
  const docs=[
    {v:'informe',l:'Informe Psicologico',ic:'Informe clinico completo'},
    {v:'consentimiento',l:'Consentimiento Informado',ic:'Documento legal de consentimiento'},
    {v:'tutor',l:'Informe de Tutor Legal',ic:'Dirigido al tutor legal del paciente'},
    {v:'alta',l:'Informe de Alta',ic:'Finalizacion del tratamiento'},
  ];
  const needsText=dtype==='informe'||dtype==='alta';
  return html`
    <${G2}>
      <${Fld} label="Paciente *"><select style=${inp} value=${pid} onChange=${e=>spid(e.target.value)}><option value="">Seleccionar...</option>${d.patients.map(p=>html`<option value=${p.id}>${p.name}</option>`)}</select></${Fld}>
      <${Fld} label="Terapeuta *"><select style=${inp} value=${tid} onChange=${e=>stid(e.target.value)}><option value="">Seleccionar...</option>${d.therapists.map(t=>html`<option value=${t.id}>${t.name}</option>`)}</select></${Fld}>
    </${G2}>
    <${Fld} label="Tipo de documento">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;">
        ${docs.map(doc=>html`
          <div onClick=${()=>sd(doc.v)} style="border:2px solid ${dtype===doc.v?'#0F6E56':'var(--bdr)'};border-radius:10px;padding:10px 12px;cursor:pointer;background:${dtype===doc.v?'#E1F5EE':'var(--bg2)'};">
            <div style="font-size:13px;font-weight:500;color:${dtype===doc.v?'#0F6E56':'var(--txt)'};">${doc.l}</div>
            <div style="font-size:11px;color:var(--txt2);margin-top:2px;">${doc.ic}</div>
          </div>`)}
      </div>
    </${Fld}>
    ${needsText&&html`
      <${Fld} label="Motivo de consulta"><textarea style="${inp}min-height:54px;resize:vertical;" value=${ex.motivo} onInput=${sv('motivo')} placeholder="Descripcion del motivo de consulta..."/></${Fld}>
      <${Fld} label="Evolucion y desarrollo del tratamiento"><textarea style="${inp}min-height:66px;resize:vertical;" value=${ex.evolucion} onInput=${sv('evolucion')} placeholder="Descripcion de la evolucion..."/></${Fld}>
      <${Fld} label="Observaciones clinicas"><textarea style="${inp}min-height:54px;resize:vertical;" value=${ex.observaciones} onInput=${sv('observaciones')} placeholder="Observaciones relevantes..."/></${Fld}>
      <${Fld} label="Recomendaciones"><textarea style="${inp}min-height:54px;resize:vertical;" value=${ex.recomendaciones} onInput=${sv('recomendaciones')} placeholder="Recomendaciones..."/></${Fld}>
    `}
    ${!needsText&&dtype==='tutor'&&html`
      <${Fld} label="Evolucion observada"><textarea style="${inp}min-height:66px;resize:vertical;" value=${ex.evolucion} onInput=${sv('evolucion')} placeholder="Descripcion de la evolucion del paciente..."/></${Fld}>
      <${Fld} label="Recomendaciones"><textarea style="${inp}min-height:54px;resize:vertical;" value=${ex.recomendaciones} onInput=${sv('recomendaciones')} placeholder="Recomendaciones..."/></${Fld}>
    `}
    <${Fld} label="Fecha del documento"><input style="${inp}max-width:200px;" type="date" value=${ex.fecha} onInput=${sv('fecha')}/></${Fld}>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button style=${btnS} onClick=${onClose}>Cancelar</button>
      <button style=${btnP} onClick=${()=>(pid&&tid)&&onSelect({patient:pat,therapist:th,dtype:dtype,ex:ex,patApts:patApts,patTx:patTx})}>Generar documento</button>
    </div>`;
}

function DocView({data,onClose}){
  const{patient,therapist,dtype,ex,patApts,patTx}=data;
  const hasTutor=patient&&patient.tutorName;
  const docDate=fmtDate(ex.fecha||todayStr());

  const docTitle=dtype==='informe'?'INFORME PSICOLOGICO':dtype==='consentimiento'?'CONSENTIMIENTO INFORMADO':dtype==='tutor'?'INFORME DE TUTOR LEGAL':'INFORME DE ALTA';

  const logoHeader=html`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #0F6E56;">
      <div>
        <img src="${LOGO}" style="height:52px;width:auto;object-fit:contain;"/>
        <div style="font-size:12px;font-weight:600;color:#0F6E56;margin-top:4px;">Clinica Mindara</div>
        <div style="font-size:11px;color:var(--txt2);">Centre de Psicologia</div>
      </div>
      <div style="text-align:right;font-size:12px;color:var(--txt2);">
        <div style="font-size:14px;font-weight:600;color:var(--txt);margin-bottom:4px;">${docTitle}</div>
        <div>Fecha: ${docDate}</div>
        <div>Terapeuta: ${therapist?therapist.name:''}</div>
        ${therapist&&therapist.licenseNum?html`<div>N Col.: ${therapist.licenseNum}</div>`:null}
      </div>
    </div>`;

  const patBox=html`
    <div style="background:#f8fffe;border:1px solid rgba(15,110,86,.13);border-radius:10px;padding:14px 16px;margin-bottom:16px;">
      <div style="font-size:10px;font-weight:700;color:#0F6E56;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;">Datos del paciente</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;font-size:12px;">
        <div style="color:var(--txt);"><span style="color:var(--txt2);">Nombre: </span><strong>${patient?patient.name:''}</strong></div>
        ${patient&&patient.dob?html`<div style="color:var(--txt);"><span style="color:var(--txt2);">Fecha nac.: </span><strong>${fmtDate(patient.dob)}</strong></div>`:null}
        ${patient&&patient.email?html`<div style="color:var(--txt);"><span style="color:var(--txt2);">Email: </span><strong>${patient.email}</strong></div>`:null}
        ${patient&&patient.phone?html`<div style="color:var(--txt);"><span style="color:var(--txt2);">Telefono: </span><strong>${patient.phone}</strong></div>`:null}
        ${patient&&patient.address?html`<div style="grid-column:1/-1;color:var(--txt);"><span style="color:var(--txt2);">Direccion: </span><strong>${patient.address}</strong></div>`:null}
        ${patient&&patient.insurance?html`<div style="color:var(--txt);"><span style="color:var(--txt2);">Seguro: </span><strong>${patient.insurance}</strong></div>`:null}
      </div>
    </div>`;

  const tutorBox=hasTutor?html`
    <div style="background:#fffbf0;border:1px solid rgba(133,79,11,.13);border-radius:10px;padding:14px 16px;margin-bottom:16px;">
      <div style="font-size:10px;font-weight:700;color:#854F0B;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;">Tutor legal</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;font-size:12px;">
        <div style="color:var(--txt);"><span style="color:var(--txt2);">Nombre: </span><strong>${patient.tutorName}</strong></div>
        <div style="color:var(--txt);"><span style="color:var(--txt2);">Relacion: </span><strong>${patient.tutorRelation||'-'}</strong></div>
        ${patient.tutorDNI?html`<div style="color:var(--txt);"><span style="color:var(--txt2);">DNI/NIE: </span><strong>${patient.tutorDNI}</strong></div>`:null}
        ${patient.tutorPhone?html`<div style="color:var(--txt);"><span style="color:var(--txt2);">Telefono: </span><strong>${patient.tutorPhone}</strong></div>`:null}
        ${patient.tutorEmail?html`<div style="color:var(--txt);"><span style="color:var(--txt2);">Email: </span><strong>${patient.tutorEmail}</strong></div>`:null}
      </div>
    </div>`:null;

  const txtBlock=(label,text)=>text?html`
    <div style="margin-bottom:14px;">
      <div style="font-size:11px;font-weight:700;color:#0F6E56;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">${label}</div>
      <div style="font-size:13px;line-height:1.7;color:var(--txt);white-space:pre-wrap;">${text}</div>
    </div>`:null;

  const sesTable=patApts.length>0?html`
    <div style="margin-bottom:16px;">
      <div style="font-size:11px;font-weight:700;color:#0F6E56;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Sesiones realizadas (${patApts.length})</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead><tr style="background:#0F6E56;color:white;">
          <th style="padding:7px 10px;text-align:left;font-weight:500;">Fecha</th>
          <th style="padding:7px 10px;text-align:left;font-weight:500;">Hora</th>
          <th style="padding:7px 10px;text-align:left;font-weight:500;">Duracion</th>
          <th style="padding:7px 10px;text-align:left;font-weight:500;">Tratamiento</th>
        </tr></thead>
        <tbody>${patApts.map((a,i)=>{
          const tx=patTx.find(t=>t.id===a.treatmentId);
          return html`<tr style="background:${i%2?'#f8f8f8':'white'};">
            <td style="padding:6px 10px;border-bottom:1px solid #eee;">${fmtDate(a.date)}</td>
            <td style="padding:6px 10px;border-bottom:1px solid #eee;">${a.time}</td>
            <td style="padding:6px 10px;border-bottom:1px solid #eee;">${a.duration} min</td>
            <td style="padding:6px 10px;border-bottom:1px solid #eee;">${tx?tx.name:'Sesion'}</td>
          </tr>`;
        })}</tbody>
      </table>
    </div>`:null;

  const sigBlock=html`
    <div style="margin-top:32px;display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div style="text-align:center;">
        <div style="border-top:1px solid #aaa;padding-top:8px;font-size:12px;color:var(--txt2);">
          ${therapist?therapist.name:''}<br/>
          ${therapist&&therapist.specialty?therapist.specialty:''}<br/>
          ${therapist&&therapist.licenseNum?'Col. '+therapist.licenseNum:''}
        </div>
      </div>
      <div style="text-align:center;">
        <div style="border-top:1px solid #aaa;padding-top:8px;font-size:12px;color:var(--txt2);">
          ${hasTutor&&dtype!=='informe'?patient.tutorName:patient?patient.name:''}<br/>
          ${hasTutor&&dtype!=='informe'?patient.tutorRelation||'Tutor legal':'Firma del paciente'}
          ${hasTutor&&dtype!=='informe'&&patient.tutorDNI?html`<br/>${patient.tutorDNI}`:null}
        </div>
      </div>
    </div>`;

  let content=null;
  if(dtype==='informe'){
    content=html`<div>
      ${logoHeader}
      ${patBox}
      ${tutorBox}
      <div style="background:#f8fffe;border:1px solid rgba(15,110,86,.13);border-radius:10px;padding:14px 16px;margin-bottom:16px;">
        <div style="font-size:10px;font-weight:700;color:#0F6E56;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;">Datos del tratamiento</div>
        ${patTx.map(t=>html`<div style="font-size:12px;margin-bottom:4px;color:var(--txt);"><strong>${t.name}</strong> - <span style="color:var(--txt2);">Inicio: ${fmtDate(t.startDate)||'-'} - Estado: ${t.status}</span></div>`)}
        ${patTx.length===0?html`<div style="font-size:12px;color:var(--txt2);">Sin tratamientos registrados</div>`:null}
      </div>
      ${txtBlock('Motivo de consulta',ex.motivo)}
      ${txtBlock('Evolucion y desarrollo del tratamiento',ex.evolucion)}
      ${sesTable}
      ${txtBlock('Observaciones clinicas',ex.observaciones)}
      ${txtBlock('Recomendaciones',ex.recomendaciones)}
      ${sigBlock}
    </div>`;
  } else if(dtype==='consentimiento'){
    const tutorNombre=hasTutor?patient.tutorName:patient?patient.name:'___';
    const tutorRel=hasTutor?patient.tutorRelation||'tutor legal':'paciente';
    const tutorDNI=hasTutor&&patient.tutorDNI?patient.tutorDNI:'_______________';
    content=html`<div>
      ${logoHeader}
      ${patBox}
      ${tutorBox}
      <div style="font-size:13px;line-height:1.8;color:var(--txt);margin-bottom:16px;">
        <p style="margin-bottom:10px;">Yo, <strong>${tutorNombre}</strong>${hasTutor?' en calidad de '+tutorRel+' de '+patient.name:''}, con DNI/NIE <strong>${tutorDNI}</strong>, mediante el presente documento:</p>
        <p style="margin-bottom:10px;"><strong>DECLARO</strong> que he sido informado/a de manera clara sobre el proceso terapeutico que se llevara a cabo en Clinica Mindara, incluyendo:</p>
        <ul style="margin-left:20px;margin-bottom:10px;">
          <li style="margin-bottom:6px;">La naturaleza y objetivos del tratamiento psicologico propuesto.</li>
          <li style="margin-bottom:6px;">Los beneficios esperados y los posibles riesgos o efectos secundarios.</li>
          <li style="margin-bottom:6px;">Las alternativas terapeuticas disponibles.</li>
          <li style="margin-bottom:6px;">El derecho a revocar este consentimiento en cualquier momento.</li>
          <li style="margin-bottom:6px;">La confidencialidad de los datos, segun la Ley Organica 3/2018 de Proteccion de Datos.</li>
        </ul>
        <p style="margin-bottom:10px;"><strong>CONSIENTO</strong> libremente el inicio del proceso terapeutico con el/la terapeuta <strong>${therapist?therapist.name:''}</strong>${therapist&&therapist.licenseNum?', N colegiado/a '+therapist.licenseNum:''}.</p>
        <p>Terapeuta: <strong>${therapist?therapist.name:''}</strong>${therapist&&therapist.specialty?' - '+therapist.specialty:''}.</p>
      </div>
      ${sigBlock}
    </div>`;
  } else if(dtype==='tutor'){
    content=html`<div>
      ${logoHeader}
      ${hasTutor?tutorBox:html`<div style="background:#FAEEDA;color:#854F0B;border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:13px;">Este paciente no tiene tutor legal registrado. Edita el paciente para anadir los datos del tutor.</div>`}
      ${patBox}
      <div style="font-size:13px;line-height:1.8;color:var(--txt);margin-bottom:16px;">
        <p style="margin-bottom:10px;">A/A de <strong>${hasTutor?patient.tutorName:'___'}</strong>, ${hasTutor?patient.tutorRelation||'tutor legal':'tutor legal'} de <strong>${patient?patient.name:''}</strong>.</p>
        <p style="margin-bottom:10px;">Por medio del presente informe, desde Clinica Mindara nos dirigimos a usted para informarle sobre la situacion y evolucion de su tutelado/a en el proceso terapeutico.</p>
        <p style="margin-bottom:10px;">El/la paciente <strong>${patient?patient.name:''}</strong> viene asistiendo a sesiones con el/la terapeuta <strong>${therapist?therapist.name:''}</strong>, habiendo realizado un total de <strong>${patApts.length} sesiones</strong>.</p>
      </div>
      ${sesTable}
      ${txtBlock('Evolucion observada',ex.evolucion)}
      ${txtBlock('Recomendaciones',ex.recomendaciones)}
      ${sigBlock}
    </div>`;
  } else {
    const primera=patApts.length>0?fmtDate(patApts[0].date):'-';
    content=html`<div>
      ${logoHeader}
      ${patBox}
      ${tutorBox}
      <div style="font-size:13px;line-height:1.8;color:var(--txt);margin-bottom:16px;">
        <p style="margin-bottom:10px;">Por medio del presente documento se certifica que <strong>${patient?patient.name:''}</strong> ha completado satisfactoriamente el proceso terapeutico en Clinica Mindara bajo la supervision de <strong>${therapist?therapist.name:''}</strong>.</p>
        <p style="margin-bottom:10px;">Total de sesiones: <strong>${patApts.length}</strong>. Fecha de inicio: <strong>${primera}</strong>. Fecha de alta: <strong>${docDate}</strong>.</p>
      </div>
      ${sesTable}
      ${txtBlock('Motivo de consulta inicial',ex.motivo)}
      ${txtBlock('Evolucion y logros',ex.evolucion)}
      ${txtBlock('Observaciones finales',ex.observaciones)}
      ${txtBlock('Recomendaciones para el alta',ex.recomendaciones)}
      ${sigBlock}
    </div>`;
  }

  return html`<div style="font-family:system-ui,sans-serif;">
    ${content}
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--bdr);" class="np">
      <button style=${btnS} onClick=${onClose}>Cerrar</button>
      <button style=${btnP} onClick=${()=>window.print()}>Imprimir / PDF</button>
    </div>
  </div>`;
}

// SECTIONS
function Dashboard({d}){
  const tod=todayStr();
  const pend=d.invoices.filter(i=>i.status==='pendiente').reduce((s,i)=>s+i.total,0);
  const paid=d.invoices.filter(i=>i.status==='pagada').reduce((s,i)=>s+i.total,0);
  const stats=[
    {l:'Pacientes',v:d.patients.length,bg:'#E1F5EE',c:'#0F6E56'},
    {l:'Terapeutas',v:d.therapists.length,bg:'#EEEDFE',c:'#534AB7'},
    {l:'Tratamientos activos',v:d.treatments.filter(t=>t.status==='activo').length,bg:'#E6F1FB',c:'#185FA5'},
    {l:'Citas hoy',v:d.appointments.filter(a=>a.date===tod).length,bg:'#FAEEDA',c:'#854F0B'}
  ];
  const recA=[...d.appointments].sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time)).slice(0,6);
  return html`<div>
    <h1 style="font-size:20px;font-weight:500;margin:0 0 20px;color:var(--txt);">Panel de control</h1>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;">
      ${stats.map(s=>html`<div style="background:${s.bg};border-radius:10px;padding:14px 16px;"><div style="font-size:11px;color:${s.c};font-weight:500;margin-bottom:6px;">${s.l}</div><div style="font-size:26px;font-weight:500;color:${s.c};">${s.v}</div></div>`)}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      <div style=${crd}><div style="font-size:11px;color:var(--txt2);margin-bottom:4px;">Pendiente de cobro</div><div style="font-size:20px;font-weight:500;color:#854F0B;">${fmtMoney(pend)}</div></div>
      <div style=${crd}><div style="font-size:11px;color:var(--txt2);margin-bottom:4px;">Total cobrado</div><div style="font-size:20px;font-weight:500;color:#0F6E56;">${fmtMoney(paid)}</div></div>
    </div>
    ${d.therapists.length>0&&html`
      <div style="${crd}margin-bottom:12px;">
        <h3 style="font-size:12px;font-weight:500;color:var(--txt2);margin:0 0 10px;">Terapeutas</h3>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          ${d.therapists.map(t=>html`<div style="display:flex;align-items:center;gap:6px;"><div style="width:10px;height:10px;border-radius:50%;background:${t.color||'#0F6E56'};flex-shrink:0;"></div><span style="font-size:12px;color:var(--txt2);">${t.name}</span></div>`)}
        </div>
      </div>
    `}
    <div style=${crd}>
      <h3 style="font-size:13px;font-weight:500;margin:0 0 14px;color:var(--txt2);">Ultimas citas</h3>
      ${recA.length===0?html`<p style="color:var(--txt2);font-size:13px;margin:0;">Sin citas aun.</p>`:recA.map((a,i)=>{
        const p=d.patients.find(p=>p.id===a.patientId);
        const th=d.therapists.find(t=>t.id===a.therapistId);
        const c=th&&th.color?th.color:'#0F6E56';
        return html`<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:${i<recA.length-1?'1px solid var(--bdr)':'none'};">
          <div style="width:3px;height:32px;border-radius:2px;background:${c};flex-shrink:0;"></div>
          <${Av} name=${p?p.name:'?'} sz=${28} color=${c}/>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p?p.name:'Paciente'}</div>
            <div style="font-size:11px;color:var(--txt2);">${th?th.name:''} - ${fmtDate(a.date)} ${a.time}</div>
          </div>
          <${Bdg} s=${a.status}/>
        </div>`;
      })}
    </div>
  </div>`;
}

function Patients({d,onAdd,onEdit,onDel}){
  const[q,sq]=useState('');
  const fl=d.patients.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())||String(p.email||'').toLowerCase().includes(q.toLowerCase()));
  return html`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
      <h1 style="font-size:20px;font-weight:500;margin:0;color:var(--txt);">Pacientes</h1>
      <button style=${btnP} onClick=${onAdd}>+ Nuevo paciente</button>
    </div>
    <input style="${inp}max-width:300px;margin-bottom:14px;" placeholder="Buscar..." value=${q} onInput=${e=>sq(e.target.value)}/>
    <div style="${crd}padding:0;overflow:hidden;">
      ${fl.length===0?html`<p style="padding:18px;color:var(--txt2);font-size:13px;">Sin pacientes.</p>`:fl.map((p,i)=>{
        const tc=d.treatments.filter(t=>t.patientId===p.id).length;
        const ac=d.appointments.filter(a=>a.patientId===p.id).length;

function Calendar({d,onAdd,onEdit}){
  const n=new Date();
  const[yr,sy]=useState(n.getFullYear());
  const[mo,sm]=useState(n.getMonth());
  const[sel,ss]=useState(null);
  const[fth,sft]=useState('all');
  const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DN=['L','M','X','J','V','S','D'];
  const adj=((new Date(yr,mo,1).getDay())+6)%7;
  const dim=new Date(yr,mo+1,0).getDate();
  const cells=[...Array(adj).fill(null),...Array.from({length:dim},(_,i)=>i+1)];
  const ds=day=>yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
  const ga=day=>d.appointments.filter(a=>a.date===ds(day)&&(fth==='all'||a.therapistId===fth)).sort((a,b)=>a.time.localeCompare(b.time));
  const isT=day=>{const t=new Date();return day&&t.getFullYear()===yr&&t.getMonth()===mo&&t.getDate()===day;};
  const prev=()=>{if(mo===0){sy(y=>y-1);sm(11);}else sm(m=>m-1);ss(null);};
  const next=()=>{if(mo===11){sy(y=>y+1);sm(0);}else sm(m=>m+1);ss(null);};
  const hours=[];
  for(let h=7;h<=21;h++)for(let m=0;m<60;m+=15){if(h===21&&m>0)break;hours.push(String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'));}
  const thC=a=>{const th=d.therapists.find(t=>t.id===a.therapistId);return th&&th.color?th.color:'#534AB7';};
  return html`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <h1 style="font-size:20px;font-weight:500;margin:0;color:var(--txt);">Calendario</h1>
      <button style=${btnP} onClick=${()=>onAdd({date:'',time:'10:00'})}>+ Nueva cita</button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center;">
      <button onClick=${()=>sft('all')} style="${bxs('')}background:${fth==='all'?'#1a1a1a':'var(--bg2)'};color:${fth==='all'?'white':'var(--txt)'};border:${fth==='all'?'none':'1px solid var(--bdr2)'};">Todos</button>
      ${d.therapists.map(t=>html`
        <button onClick=${()=>sft(fth===t.id?'all':t.id)} style="${bxs('')}display:flex;align-items:center;gap:5px;background:${fth===t.id?t.color||'#534AB7':'var(--bg2)'};color:${fth===t.id?'white':'var(--txt)'};border:${fth===t.id?'none':'1px solid var(--bdr2)'};">
          <div style="width:8px;height:8px;border-radius:50%;background:${fth===t.id?'white':t.color||'#534AB7'};flex-shrink:0;"></div>
          ${t.name.split(' ')[0]}
        </button>`)}
    </div>
    <div style="display:grid;grid-template-columns:1fr 300px;gap:14px;align-items:start;">
      <div style=${crd}>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <button onClick=${prev} style="background:none;border:1px solid var(--bdr2);border-radius:7px;padding:5px 11px;cursor:pointer;color:var(--txt);">Ant</button>
          <span style="font-weight:500;font-size:14px;color:var(--txt);">${MN[mo]} ${yr}</span>
          <button onClick=${next} style="background:none;border:1px solid var(--bdr2);border-radius:7px;padding:5px 11px;cursor:pointer;color:var(--txt);">Sig</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;">
          ${DN.map(d=>html`<div style="text-align:center;font-size:10px;font-weight:500;color:var(--txt2);padding:3px 0;">${d}</div>`)}
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">
          ${cells.map(day=>{
            const apts=day?ga(day):[];
            const tod=isT(day);
            const isSel=day&&sel===day;
            return html`<div onClick=${()=>day&&ss(day===sel?null:day)} style="min-height:64px;border-radius:6px;background:${isSel?'#1a1a1a':tod?'#f0fdf8':day?'var(--bg2)':'transparent'};border:${tod&&!isSel?'1.5px solid #0F6E56':'1px solid var(--bdr)'};padding:3px;cursor:${day?'pointer':'default'};overflow:hidden;">
              ${day?html`
                <div style="font-size:10px;font-weight:500;color:${isSel?'white':tod?'#0F6E56':'var(--txt)'};margin-bottom:2px;">${day}</div>
                ${apts.slice(0,3).map(a=>{
                  const p=d.patients.find(p=>p.id===a.patientId);
                  const c=thC(a);
                  return html`<div style="background:${c}22;color:${c};border-left:2px solid ${c};border-radius:0 3px 3px 0;padding:1px 3px;font-size:8px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${a.time} ${p&&p.name?p.name.split(' ')[0]:'Cita'}</div>`;
                })}
                ${apts.length>3?html`<div style="font-size:8px;color:${isSel?'rgba(255,255,255,.7)':'var(--txt2)'};">+${apts.length-3}</div>`:null}
              `:null}
            </div>`;
          })}
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid var(--bdr);">
          ${d.therapists.filter(t=>fth==='all'||t.id===fth).map(t=>html`
            <div style="display:flex;align-items:center;gap:4px;">
              <div style="width:10px;height:10px;border-radius:50%;background:${t.color||'#534AB7'};"></div>
              <span style="font-size:10px;color:var(--txt2);">${t.name}</span>
            </div>`)}
        </div>
      </div>
      <div style=${crd}>
        ${sel?html`
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <h3 style="margin:0;font-size:13px;font-weight:500;color:var(--txt);">${sel} ${MN[mo]}</h3>
            <button style="${bxs('')}background:#0F6E56;color:white;border:none;" onClick=${()=>onAdd({date:ds(sel),time:'10:00'})}>+ Cita</button>
          </div>
          <div style="max-height:520px;overflow-y:auto;">
            ${hours.map(time=>{
              const apts=ga(sel).filter(a=>a.time===time);
              const isHour=time.endsWith(':00');
              return html`<div style="display:flex;gap:8px;min-height:26px;${isHour?'border-top:1px solid var(--bdr);':''}">
                <div style="width:36px;flex-shrink:0;font-size:10px;color:${isHour?'var(--txt2)':'var(--txt3)'};padding-top:3px;text-align:right;">${isHour?time:''}</div>
                <div style="flex:1;padding:2px 0;">
                  ${apts.length===0
                    ?html`<div onClick=${()=>onAdd({date:ds(sel),time:time})} style="height:22px;border-radius:4px;cursor:pointer;" onMouseEnter=${e=>e.currentTarget.style.background='#f0fdf8'} onMouseLeave=${e=>e.currentTarget.style.background='transparent'}></div>`
                    :apts.map(a=>{
                      const p=d.patients.find(p=>p.id===a.patientId);
                      const th=d.therapists.find(t=>t.id===a.therapistId);
                      const c=th&&th.color?th.color:'#534AB7';
                      return html`<div onClick=${()=>onEdit(a)} style="background:${c}18;border-left:3px solid ${c};border-radius:0 5px 5px 0;padding:3px 8px;font-size:11px;cursor:pointer;margin-bottom:2px;">
                        <span style="font-weight:500;color:${c};">${p&&p.name?p.name.split(' ')[0]:'Cita'}</span>
                        ${th?html`<span style="color:${c};opacity:.7;"> - ${th.name.split(' ')[0]}</span>`:null}
                        <span style="color:${c};opacity:.7;"> - ${a.duration}min</span>
                        ${a.status==='realizada'?html`<span style="color:#0F6E56;"> v</span>`:null}
                        ${a.status==='cancelado'?html`<span style="color:#A32D2D;"> x</span>`:null}
                      </div>`;
                    })
                  }
                </div>
              </div>`;
            })}
          </div>
        `:html`<p style="font-size:12px;color:var(--txt2);margin:0;">Haz clic en un dia para ver el horario.</p>`}
      </div>
    </div>
  </div>`;
}

    </div>
    <div style=${crd}>
      <h3 style="font-size:13px;font-weight:500;color:var(--txt2);margin:0 0 10px;">Sobre los documentos</h3>
      <p style="font-size:12px;color:var(--txt2);line-height:1.7;margin:0;">Si el paciente tiene un tutor legal registrado, sus datos apareceran automaticamente en los documentos que lo requieran. Puedes imprimir o guardar como PDF desde el dialogo de impresion del navegador.</p>
    </div>
  </div>`;
}

function Users({d,onAdd,onEdit,onDel}){
  return html`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
      <h1 style="font-size:20px;font-weight:500;margin:0;color:var(--txt);">Usuarios</h1>
      <button style=${btnP} onClick=${onAdd}>+ Nuevo usuario</button>
    </div>
    <div style="${crd}padding:0;overflow:hidden;">
      ${d.users.length===0?html`<p style="padding:18px;color:var(--txt2);font-size:13px;">Sin usuarios.</p>`:d.users.map((u,i)=>html`
        <div style="display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:${i<d.users.length-1?'1px solid var(--bdr)':'none'};">
          <${Av} name=${u.name}/>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:500;color:var(--txt);">${u.name}</div>
            <div style="font-size:11px;color:var(--txt2);">@${u.username}</div>
          </div>
          <span style="background:${u.role==='admin'?'#EEEDFE':'#E6F1FB'};color:${u.role==='admin'?'#534AB7':'#185FA5'};padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500;">${u.role==='admin'?'Admin':'Usuario'}</span>
          <button style=${bxs('background:var(--bg2);color:var(--txt);border:1px solid var(--bdr2);')} onClick=${()=>onEdit(u)}>Editar</button>
          <button style=${bxs('background:#FCEBEB;color:#A32D2D;border:none;')} onClick=${()=>confirm('Borrar usuario?')&&onDel(u.id)}>Borrar</button>
        </div>`)}
    </div>
  </div>`;
}

// APP
function App(){
  const[user,su]=useState(null);
  const[d,setD]=useState(DEFDATA);
  const[sec,ss]=useState('dashboard');
  const[modal,sm]=useState(null);
  const[ready,sr]=useState(false);

  useEffect(()=>{
    const u=sessionStorage.getItem('mu');
    if(u)su(JSON.parse(u));
    setD(dbLoad());
    sr(true);
  },[]);

  const upd=nd=>{setD(nd);dbSave(nd);};
  const cl=()=>sm(null);
  const isAdmin=user&&user.role==='admin';
  const logout=()=>{sessionStorage.removeItem('mu');su(null);ss('dashboard');};

  const addP=f=>{upd(Object.assign({},d,{patients:[Object.assign({},f,{id:uid()}),...d.patients]}));cl();};
  const edP=f=>{upd(Object.assign({},d,{patients:d.patients.map(p=>p.id===f.id?f:p)}));cl();};
  const delP=id=>{upd(Object.assign({},d,{patients:d.patients.filter(p=>p.id!==id)}));};

  const addT=f=>{upd(Object.assign({},d,{therapists:[Object.assign({},f,{id:uid()}),...d.therapists]}));cl();};
  const edT=f=>{upd(Object.assign({},d,{therapists:d.therapists.map(t=>t.id===f.id?f:t)}));cl();};
  const delT=id=>{upd(Object.assign({},d,{therapists:d.therapists.filter(t=>t.id!==id)}));};

  const addTx=f=>{upd(Object.assign({},d,{treatments:[Object.assign({},f,{id:uid()}),...d.treatments]}));cl();};
  const edTx=f=>{upd(Object.assign({},d,{treatments:d.treatments.map(t=>t.id===f.id?f:t)}));cl();};
  const delTx=id=>{upd(Object.assign({},d,{treatments:d.treatments.filter(t=>t.id!==id)}));};

  const addA=f=>{upd(Object.assign({},d,{appointments:[Object.assign({},f,{id:uid(),invoiced:false}),...d.appointments]}));cl();};
  const edA=f=>{upd(Object.assign({},d,{appointments:d.appointments.map(a=>a.id===f.id?f:a)}));cl();};
  const delA=id=>{upd(Object.assign({},d,{appointments:d.appointments.filter(a=>a.id!==id)}));};

  const addInv=f=>{
    const inv=Object.assign({},f,{id:uid(),number:d.counter,date:todayStr()});
    const nA=d.appointments.map(a=>f.aptIds&&f.aptIds.includes(a.id)?Object.assign({},a,{invoiced:true}):a);
    upd(Object.assign({},d,{invoices:[inv,...d.invoices],appointments:nA,counter:d.counter+1}));cl();
  };
  const delInv=id=>{
    const inv=d.invoices.find(i=>i.id===id);
    const nA=d.appointments.map(a=>inv&&inv.aptIds&&inv.aptIds.includes(a.id)?Object.assign({},a,{invoiced:false}):a);
    upd(Object.assign({},d,{invoices:d.invoices.filter(i=>i.id!==id),appointments:nA}));
  };
  const stInv=(id,status)=>upd(Object.assign({},d,{invoices:d.invoices.map(i=>i.id===id?Object.assign({},i,{status:status}):i)}));

  const addU=f=>{
    if(!f.password)return;
    upd(Object.assign({},d,{users:[Object.assign({},f,{id:uid(),active:1}),...d.users]}));cl();
  };
  const edU=f=>{
    const existing=d.users.find(u=>u.id===f.id);
    const updated=f.password?f:Object.assign({},f,{password:existing?existing.password:''});
    upd(Object.assign({},d,{users:d.users.map(u=>u.id===f.id?updated:u)}));
    if(user&&user.id===f.id){const nu=Object.assign({},user,updated);sessionStorage.setItem('mu',JSON.stringify(nu));su(nu);}
    cl();
  };
  const delU=id=>{upd(Object.assign({},d,{users:d.users.filter(u=>u.id!==id)}));};

  if(!ready)return html`<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--txt2);">Cargando...</div>`;
  if(!user)return html`<${Login} onLogin=${su}/>`;

  const nav=[
    {id:'dashboard',ic:'Panel'},
    {id:'patients',ic:'Pacientes'},
    {id:'therapists',ic:'Terapeutas'},
    {id:'treatments',ic:'Tratamientos'},
    {id:'calendar',ic:'Calendario'},
    {id:'appointments',ic:'Citas'},
    {id:'invoices',ic:'Facturas'},
    {id:'docs',ic:'Informes'},
  ];
  if(isAdmin)nav.push({id:'users',ic:'Usuarios'});

  return html`
    <div style="display:flex;height:730px;overflow:hidden;border-radius:14px;border:1px solid var(--bdr);box-shadow:0 4px 24px rgba(0,0,0,.08);">
      <div style="width:160px;flex-shrink:0;border-right:1px solid var(--bdr);background:var(--bg2);display:flex;flex-direction:column;">
        <div style="padding:12px 14px 8px;border-bottom:1px solid var(--bdr);margin-bottom:6px;">
          <img src="${LOGO}" style="height:26px;width:auto;object-fit:contain;"/>
          <div style="font-size:10px;font-weight:600;color:#0F6E56;margin-top:3px;">Clinica Mindara</div>
        </div>
        <nav style="padding:6px;flex:1;overflow-y:auto;">
          ${nav.map(n=>html`<button onClick=${()=>ss(n.id)} style="display:flex;align-items:center;width:100%;padding:7px 10px;border-radius:7px;border:none;background:${sec===n.id?'#0F6E56':'transparent'};color:${sec===n.id?'white':'var(--txt2)'};cursor:pointer;font-size:12px;font-weight:${sec===n.id?'500':'400'};text-align:left;margin-bottom:2px;font-family:inherit;">${n.ic}</button>`)}
        </nav>
        <div style="padding:10px 12px;border-top:1px solid var(--bdr);">
          <div style="font-size:11px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${user.name}</div>
          <div style="font-size:10px;color:var(--txt2);margin-bottom:6px;">${isAdmin?'Admin':'Usuario'}</div>
          <button onClick=${logout} style="${bxs('')}width:100%;background:var(--bg);color:var(--txt2);border:1px solid var(--bdr2);text-align:center;">Salir</button>
        </div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:20px;min-width:0;background:var(--bg2);">
        ${sec==='dashboard'?html`<${Dashboard} d=${d}/>`:null}
        ${sec==='patients'?html`<${Patients} d=${d} onAdd=${()=>sm({t:'ap'})} onEdit=${p=>sm({t:'ep',p:p})} onDel=${delP}/>`:null}
        ${sec==='therapists'?html`<${Therapists} d=${d} onAdd=${()=>sm({t:'at'})} onEdit=${t=>sm({t:'et',p:t})} onDel=${delT}/>`:null}
        ${sec==='treatments'?html`<${Treatments} d=${d} onAdd=${()=>sm({t:'atx'})} onEdit=${t=>sm({t:'etx',p:t})} onDel=${delTx}/>`:null}
        ${sec==='calendar'?html`<${Calendar} d=${d} onAdd=${init=>sm({t:'aa',p:init})} onEdit=${a=>sm({t:'ea',p:a})}/>`:null}
        ${sec==='appointments'?html`<${AptList} d=${d} onAdd=${init=>sm({t:'aa',p:init})} onEdit=${a=>sm({t:'ea',p:a})} onDel=${delA}/>`:null}
        ${sec==='invoices'?html`<${Invoices} d=${d} isAdmin=${isAdmin} onAdd=${()=>sm({t:'ai'})} onView=${inv=>sm({t:'vi',p:inv})} onDel=${delInv} onStatus=${stInv}/>`:null}
        ${sec==='docs'?html`<${Docs} onGenerate=${()=>sm({t:'doc'})}/>`:null}
        ${sec==='users'&&isAdmin?html`<${Users} d=${d} onAdd=${()=>sm({t:'au'})} onEdit=${u=>sm({t:'eu',p:u})} onDel=${delU}/>`:null}
      </div>

      ${modal&&modal.t==='ap'?html`<${Moda} title="Nuevo paciente" onClose=${cl} wide=${true}><${PatForm} onSave=${addP} onClose=${cl}/></${Moda}>`:null}
      ${modal&&modal.t==='ep'?html`<${Moda} title="Editar paciente" onClose=${cl} wide=${true}><${PatForm} init=${modal.p} onSave=${f=>edP(Object.assign({},modal.p,f))} onClose=${cl}/></${Moda}>`:null}
      ${modal&&modal.t==='at'?html`<${Moda} title="Nuevo terapeuta" onClose=${cl}><${ThForm} onSave=${addT} onClose=${cl}/></${Moda}>`:null}
      ${modal&&modal.t==='et'?html`<${Moda} title="Editar terapeuta" onClose=${cl}><${ThForm} init=${modal.p} onSave=${f=>edT(Object.assign({},modal.p,f))} onClose=${cl}/></${Moda}>`:null}
      ${modal&&modal.t==='atx'?html`<${Moda} title="Nuevo tratamiento" onClose=${cl}><${TxForm} patients=${d.patients} therapists=${d.therapists} onSave=${addTx} onClose=${cl}/></${Moda}>`:null}
      ${modal&&modal.t==='etx'?html`<${Moda} title="Editar tratamiento" onClose=${cl}><${TxForm} init=${modal.p} patients=${d.patients} therapists=${d.therapists} onSave=${f=>edTx(Object.assign({},modal.p,f))} onClose=${cl}/></${Moda}>`:null}
      ${modal&&modal.t==='aa'?html`<${Moda} title="Nueva cita" onClose=${cl}><${AptForm} init=${modal.p} patients=${d.patients} therapists=${d.therapists} treatments=${d.treatments} onSave=${addA} onClose=${cl}/></${Moda}>`:null}
      ${modal&&modal.t==='ea'?html`<${Moda} title="Editar cita" onClose=${cl}><${AptForm} init=${modal.p} patients=${d.patients} therapists=${d.therapists} treatments=${d.treatments} onSave=${f=>edA(Object.assign({},modal.p,f))} onClose=${cl}/></${Moda}>`:null}
      ${modal&&modal.t==='ai'?html`<${Moda} title="Generar factura" onClose=${cl} wide=${true}><${InvForm} patients=${d.patients} appointments=${d.appointments} treatments=${d.treatments} therapists=${d.therapists} onSave=${addInv} onClose=${cl}/></${Moda}>`:null}
      ${modal&&modal.t==='vi'?html`<${Moda} title="Factura" onClose=${cl} wide=${true}><${InvView} inv=${modal.p} patient=${d.patients.find(p=>p.id===modal.p.patientId)} therapist=${d.therapists.find(t=>t.id===(d.appointments.find(a=>modal.p.aptIds&&modal.p.aptIds.includes(a.id))?.therapistId))} appointments=${d.appointments} treatments=${d.treatments} onClose=${cl}/></${Moda}>`:null}
      ${modal&&modal.t==='doc'?html`<${Moda} title="Nuevo documento" onClose=${cl} wide=${true}><${DocSelector} d=${d} onSelect=${data=>sm({t:'dv',p:data})} onClose=${cl}/></${Moda}>`:null}
      ${modal&&modal.t==='dv'?html`<${Moda} title="Vista previa" onClose=${cl} xl=${true}><${DocView} data=${modal.p} onClose=${cl}/></${Moda}>`:null}
      ${modal&&modal.t==='au'?html`<${Moda} title="Nuevo usuario" onClose=${cl}><${UserForm} onSave=${addU} onClose=${cl}/></${Moda}>`:null}
      ${modal&&modal.t==='eu'?html`<${Moda} title="Editar usuario" onClose=${cl}><${UserForm} init=${modal.p} onSave=${f=>edU(Object.assign({},modal.p,f))} onClose=${cl}/></${Moda}>`:null}
    </div>`;
}

render(html`<${App}/>`,document.getElementById('root'));
</script>
</body>
</html>
